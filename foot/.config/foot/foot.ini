# Wayland terminal for the Sway setup. Auto-reloads on file change.
font=Hack Nerd Font Mono:size=12
font-bold=Hack Nerd Font Mono:weight=bold:size=12
# Keep at 0; 1 over-shoots in foot's fcft renderer.
vertical-letter-offset=0
pad=8x8
selection-target=clipboard
# Neutral pre-tmux title; avoids "foot" flash.
title=terminal

[bell]
# BEL on unfocused foot → sway urgent + mako notification. Tmux swallows
# BEL, so this only fires from commands run directly in foot.
urgent=yes
notify=yes

[scrollback]
lines=50000
multiplier=3.0

[cursor]
# Pin shape so DECSCUSR changes don't confuse zle.
style=block
blink=no

[mouse]
hide-when-typing=yes

# Accept Ctrl+Insert / Shift+Insert alongside foot's default Ctrl+Shift+c/v.
# The programmable keyboard's Cmd+C/V/X sends these chords so copy/paste
# works uniformly across foot, Chrome, GTK apps, and tmux.
[key-bindings]
primary-paste=none
clipboard-copy=Control+Shift+c Control+Insert XF86Copy
clipboard-paste=Control+Shift+v Shift+Insert XF86Paste

[colors-dark]
# THEME BEGIN: foot-colors
alpha=0.9
foreground=cdd6f4
background=1e1e2e

# normal
regular0=1e1e2e
regular1=f38ba8
regular2=a6e3a1
regular3=f9e2af
regular4=89b4fa
regular5=f5c2e7
regular6=94e2d5
regular7=bac2de

# bright
bright0=585b70
bright1=f38ba8
bright2=a6e3a1
bright3=f9e2af
bright4=89b4fa
bright5=f5c2e7
bright6=94e2d5
bright7=a6adc8

selection-foreground=1e1e2e
selection-background=f5e0dc

# `<text> <cursor-cell>`. Default per-cell invert breaks zsh-autosuggestions
# and syntax-highlighting under the cursor.
cursor=1e1e2e f5e0dc
# THEME END: foot-colors

[url]
launch=xdg-open ${url}
label-letters=sadfjklewcmpgh
osc8-underline=url-mode
