line-length = 88
target-version = "py311"
extend-exclude = [
  "yazi/.config/yazi/flavors",
]

[lint]
select = [
  "E4",
  "E7",
  "E9",
  "F",
  "B",
  "UP",
  "SIM",
  "I",
  "C4",
  "PIE",
  "RUF",
  "PERF",
]

[format]
quote-style = "double"
indent-style = "space"
line-ending = "lf"
docstring-code-format = true
skip-magic-trailing-comma = false
