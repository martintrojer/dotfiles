# Make the tower's power button suspend instead of power off: short press is
# "go to sleep", long press still powers off as an escape hatch. Global logind
# setting, so it applies in Sway, the gamescope session, and at the SDDM
# greeter. Installed by fedora/config/setup-power-key.sh. When Steam games are
# running (see fedora/config/setup-steam-pause.sh) suspend also pauses/resumes
# them.
[Login]
HandlePowerKey=suspend
HandlePowerKeyLongPress=poweroff
