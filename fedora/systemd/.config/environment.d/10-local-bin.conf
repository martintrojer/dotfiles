# Put ~/.local/bin on PATH for the whole graphical session.
#
# The systemd user manager reads ~/.config/environment.d/*.conf at login and
# applies the result to every user service and graphical-session app (sway,
# fuzzel, and anything they launch — including Steam). Without this, apps
# started from fuzzel inherit only the bare login PATH
# (/usr/local/sbin:/usr/local/bin:/usr/bin), so wrapper executables stowed in
# ~/.local/bin (e.g. `optiscaler-client`, `wallpaper`; see fedora/bin/README.md)
# fail with "command not found". Interactive shells worked only because zsh
# prepends ~/.local/bin itself.
PATH=$HOME/.local/bin:$PATH
