# 1. Standard tmux terminal inside the session
set-option -g default-terminal "tmux-256color"
# 2. Modern RGB/True Color support for common host terminals
set-option -as terminal-features ",xterm*:RGB,alacritty:RGB,ghostty:RGB,wezterm:RGB,kitty:RGB"
# 3. Modern support for undercurl/underline styling
set-option -as terminal-features ",xterm*:usstyle,alacritty:usstyle,ghostty:usstyle,wezterm:usstyle,kitty:usstyle"

set-option -g set-titles on
set-option -g set-titles-string "#H / #W"

set -g prefix ^B
set -g base-index 1              # start indexing windows at 1 instead of 0
setw -g pane-base-index 1        # start indexing panes at 1 instead of 0
set -g detach-on-destroy off     # don't exit from tmux when closing a session
set -g escape-time 0             # zero-out escape time delay
set -g history-limit 20000       # increase history size (from 2,000)
set -g renumber-windows on       # renumber all windows when any window is closed
set -g set-clipboard on          # use system clipboard
set -g allow-passthrough on      # allow OSC52 to pass through to outer terminal
set -g focus-events on           # let programs detect pane focus changes
set -g mouse on                  # enable mouse (click panes/windows, resize, scroll)
set -g extended-keys on           # xterm-style extended key reporting (CSI u)
set -g extended-keys-format csi-u # use CSI u format for extended keys
set -g repeat-time 1000          # 1s window for repeatable bindings
bind s run-shell -b "$HOME/.config/tmux/scripts/session-loop list"
bind S choose-tree -sZ -O name   # session picker sorted alphabetically
bind -n MouseDown1StatusLeft choose-tree -s  # click session tab to open session picker

# Session loop: cycle between pinned sessions
bind _ run-shell -b "$HOME/.config/tmux/scripts/session-loop toggle"
bind ( run-shell "$HOME/.config/tmux/scripts/session-loop prev" \; switch-client -T session-loop
bind ) run-shell "$HOME/.config/tmux/scripts/session-loop next" \; switch-client -T session-loop
bind -r -T session-loop ( run-shell "$HOME/.config/tmux/scripts/session-loop prev" \; switch-client -T session-loop
bind -r -T session-loop ) run-shell "$HOME/.config/tmux/scripts/session-loop next" \; switch-client -T session-loop
set -g status-position top       # macOS / darwin style
setw -g mode-keys vi
setw -g aggressive-resize on     # resize based on active client, not smallest
set -g pane-active-border-style 'fg=#cba6f7,bg=default' # lavender
set -g pane-border-style 'fg=#6c7086,bg=default'        # overlay0
set -g mode-style 'fg=#11111b,bg=#89dceb,bold'         # built-in picker selection
set -g message-style 'fg=#cdd6f4,bg=#313244'           # prompts / notices
set -g message-command-style 'fg=#11111b,bg=#89dceb,bold'
set -g popup-style 'fg=#cdd6f4,bg=#1e1e2e'
set -g popup-border-style 'fg=#6c7086,bg=#1e1e2e'
set -g menu-style 'fg=#cdd6f4,bg=#1e1e2e'
set -g menu-selected-style 'fg=#11111b,bg=#89dceb,bold'

bind -n C-q clear-history

# Vi copy-mode bindings
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-selection-and-cancel

# Splits and new windows inherit current path
bind '"' split-window -v -c "#{pane_current_path}"
bind % split-window -h -c "#{pane_current_path}"
bind c new-window -c "#{pane_current_path}"

# Resize panes by 1 cell
bind -r H resize-pane -L 5
bind -r L resize-pane -R 5
bind -r K resize-pane -U 5
bind -r J resize-pane -D 5

# Cycle vertical split between 1/3, 1/2, 2/3
bind -r V run-shell 'pw=#{pane_width}; ww=#{window_width}; r=$((pw * 100 / ww)); if [ $r -lt 40 ]; then tmux resize-pane -x $((ww / 2)); elif [ $r -lt 60 ]; then tmux resize-pane -x $((ww * 2 / 3)); else tmux resize-pane -x $((ww / 3)); fi'

set-environment -g TMUX_FZF_OPTIONS "-p -w 80% -h 75% -m"
bind v run-shell -b "$HOME/.tmux/plugins/tmux-fzf/scripts/clipboard.sh"
bind g display-popup -E -w 60% -h 80% "$HOME/.config/tmux/scripts/cheatsheet"
set -g @fingers-key Space
set -g @fingers-jump-key j
set -g @fingers-show-copied-notification 1
set -g @fingers-hint-style 'fg=green,bold,underscore'
set -g @fingers-selected-hint-style 'fg=blue,bold,underscore'
set -g @fingers-pattern-0 '[A-Za-z0-9._%+-]+@[A-Za-z0-9.-]+\.[A-Za-z]{2,}'
set -g @fingers-pattern-1 '\b[a-zA-Z0-9.-]+:\d{2,5}\b'
set -g @fingers-pattern-2 '\bv?\d+\.\d+\.\d+\b'
set -g @fingers-pattern-3 '\bD\d+\b'
set -g @fingers-pattern-4 '\bT\d+\b'

set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-cpu'
set -g @plugin 'Morantron/tmux-fingers'
set -g @plugin 'sainnhe/tmux-fzf'
set -g @plugin 'christoomey/vim-tmux-navigator'

# Catppuccin Mocha palette used directly (no theme plugin).
# Only colors actually referenced below are listed. Tmux uses "dark block
# + warm accent text" so it visually breaks away from nvim's pastel-filled
# tabline blocks on the row right below.
# sky      #89dceb  session block fg (blue-leaning, distinct from active)
# lavender #b4befe  active window fg (cool accent)
# peach    #fab387  AI badge bg, CPU medium fg
# red      #f38ba8  attention marker
# yellow   #f9e2af  PREFIX badge bg
# text     #cdd6f4  primary text, CPU high fg
# subtext0 #a6adc8  passive segments fg, zoom marker
# overlay0 #6c7086  inactive window number
# surface0 #313244  session block bg, CPU low/medium bg
# surface1 #45475a  CPU high bg
# surface2 #585b70  active window bg
# base     #1e1e2e  optional filled surfaces when needed
# crust    #11111b  dark text on filled accent blocks (PREFIX, AI)

# Native status bar with merged windows and boxed high-signal segments.
# Keep the bar itself on the terminal default background so inactive
# windows and flat right-side segments do not get an extra fill.
set -g status-style 'bg=default,fg=#cdd6f4'
# Switch hooks below drive most updates; the timer just covers passive
# segments (CPU, RAM, uptime) and any transient state the hooks miss.
set -g status-interval 5
set -g status-left-length 40
set -g status-right-length 210
set -g status-justify left
set -g window-status-separator '  '
set -g window-status-style 'bg=default'

# Shared label format for active-pane derived window names.
set -g @win_label '#($HOME/.config/tmux/scripts/status-window-label "#{window_name}" "#{pane_current_command}" "#{pane_title}" "#{pane_current_path}" "#{host}" "#{pane_pid}")'

# Spacer between right-side segments. Bumping this changes every gap.
set -g @sep '#[default]  '

# Trailing whitespace is intentional padding before the first window block.
set -g status-left '#[fg=#89dceb,bg=#313244,bold] #S #[default]   '
set -g window-status-format '#[fg=#6c7086]#[bg=#313244] #I #[fg=#a6adc8]#[bg=#313244]#{E:@win_label}#{?window_zoomed_flag, 󰍉,}#{?@agent_attention, #[fg=#f38ba8]#[bg=#313244]!,} #[default]'
set -g window-status-current-format '#[fg=#b4befe]#[bg=#585b70]#[bold] #I #{E:@win_label}#{?window_zoomed_flag, 󰍉,}#{?@agent_attention, #[fg=#f38ba8]#[bg=#585b70]!,} #[default]'
# tmux-cpu thresholds: <75 muted, 75-90 peach fg, >90 text fg on surface1.
set -g @cpu_low_fg_color    '#[fg=#a6adc8]'
set -g @cpu_medium_fg_color '#[fg=#fab387]'
set -g @cpu_high_fg_color   '#[fg=#cdd6f4]'
set -g @cpu_low_bg_color    '#[bg=#313244]'
set -g @cpu_medium_bg_color '#[bg=#313244]'
set -g @cpu_high_bg_color   '#[bg=#313244]'
set -g @cpu_medium_thresh   75
set -g @cpu_high_thresh     90

# AI/PREFIX badges use the same subtle surface as the session block so the
# accents read like outlined boxes instead of fully filled pills.
set -g status-right '#{?client_prefix,#[fg=#f9e2af]#[bg=#313244]#[bold] PREFIX #[default]#{E:@sep},}#[fg=#fab387]#[bg=#313244]#[bold]#($HOME/.config/tmux/scripts/status-ai)#[default]#{cpu_bg_color}#{cpu_fg_color}󰍛 #{cpu_percentage}#[default]#{E:@sep}#($HOME/.config/tmux/scripts/status-ram)#[default]#{E:@sep}#[fg=#a6adc8]#[bg=#313244]󰒋 #H#[default]#{E:@sep}#[fg=#a6adc8]#[bg=#313244]󰔚 #($HOME/.config/tmux/scripts/status-uptime)#[default]'

# Open picker for windows that need attention.
bind A display-popup -E -w 80% -h 70% "$HOME/.config/tmux/scripts/agent-attention menu"

# Clear attention when switching panes/windows/sessions. The hook fires from
# the tmux server, so TMUX_PANE is not propagated and find_tty() can't help;
# we pass the focused pane id via --pane #{pane_id} instead. clear-current
# itself calls refresh-client -S, so the hooks don't need to repeat it.
%hidden ATTN_CLEAR="run-shell -b '$HOME/.config/tmux/scripts/agent-attention clear-current --pane #{pane_id}'"
set-hook -g pane-focus-in          "$ATTN_CLEAR"
set-hook -g after-select-window    "$ATTN_CLEAR"
set-hook -g client-session-changed "$ATTN_CLEAR"

# Note: Plugins are loaded by TPM below. Do not run them directly.

# Set ssh auth
set -g update-environment "DISPLAY SSH_ASKPASS SSH_AGENT_PID SSH_CONNECTION WINDOWID XAUTHORITY"
set-environment -g 'SSH_AUTH_SOCK' $HOME/.ssh/ssh_auth_sock

# Initialize TPM (must be last)
run '$HOME/.tmux/plugins/tpm/tpm'
