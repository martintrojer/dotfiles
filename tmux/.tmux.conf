# 1. Standard tmux terminal inside the session
set-option -g default-terminal "tmux-256color"
# 2. Modern RGB/True Color support for your xterm-based host
set-option -as terminal-features ",xterm*:RGB"
# 3. Modern support for undercurl/underline styling
set-option -as terminal-features ",xterm*:usstyle"

set-option -g set-titles on
set-option -g set-titles-string "#H / #W"

set -g prefix ^B
set -g base-index 1              # start indexing windows at 1 instead of 0
setw -g pane-base-index 1        # start indexing panes at 1 instead of 0
set -g detach-on-destroy off     # don't exit from tmux when closing a session
set -g escape-time 0             # zero-out escape time delay
set -g history-limit 1000000     # increase history size (from 2,000)
set -g renumber-windows on       # renumber all windows when any window is closed
set -g set-clipboard on          # use system clipboard
set -g allow-passthrough on      # allow OSC52 to pass through to outer terminal
set -g focus-events on           # let programs detect pane focus changes
set -g mouse on                  # enable mouse (click panes/windows, resize, scroll)
bind -n MouseDown1StatusLeft choose-tree -s  # click session tab to open session picker
set -g status-position top       # macOS / darwin style
setw -g mode-keys vi
setw -g aggressive-resize on     # resize based on active client, not smallest
set -g pane-active-border-style 'fg=#cba6f7,bg=default' # catppuccin lavender
set -g pane-border-style 'fg=#6c7086,bg=default'        # catppuccin overlay0

bind -n C-q clear-history

# AI agent attention script
set -g @agent_attention_script "$HOME/.config/tmux/scripts/agent-attention"

# Vi copy-mode bindings
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-selection-and-cancel

# Splits and new windows inherit current path
bind '"' split-window -v -c "#{pane_current_path}"
bind % split-window -h -c "#{pane_current_path}"
bind c new-window -c "#{pane_current_path}"

# Resize panes by 1 cell
bind -r H resize-pane -L 5
bind -r L resize-pane -R 5
bind -r K resize-pane -U 5
bind -r J resize-pane -D 5

# Cycle vertical split between 1/3, 1/2, 2/3
bind -r v run-shell 'pw=#{pane_width}; ww=#{window_width}; r=$((pw * 100 / ww)); if [ $r -lt 40 ]; then tmux resize-pane -x $((ww / 2)); elif [ $r -lt 60 ]; then tmux resize-pane -x $((ww * 2 / 3)); else tmux resize-pane -x $((ww / 3)); fi'

set-environment -g TMUX_FZF_OPTIONS "-p -w 80% -h 75% -m"
set -g @thumbs-regexp-1 '[A-Za-z0-9._%+-]+@[A-Za-z0-9.-]+\.[A-Za-z]{2,}'
set -g @thumbs-regexp-2 '\b[a-zA-Z0-9.-]+:\d{2,5}\b'
set -g @thumbs-regexp-3 '\bv?\d+\.\d+\.\d+\b'
set -g @thumbs-regexp-4 '\bD\d+\b'
set -g @thumbs-regexp-5 '\bT\d+\b'
set -g @thumbs-contrast 1
set -g @thumbs-unique enabled
set -g @thumbs-position right

set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-cpu'
set -g @plugin 'fcsonline/tmux-thumbs'
set -g @plugin 'sainnhe/tmux-fzf'
set -g @plugin 'catppuccin/tmux#v2.1.3'
set -g @plugin 'christoomey/vim-tmux-navigator'

# Configure the catppuccin plugin
set -g @catppuccin_flavor "mocha"
set -g @catppuccin_window_status_style "basic"

# Make the status line pretty and add some modules
# Note: These use catppuccin status variables which are set by the plugin
set -g status-right-length 180
set -g status-left-length 100
set -g status-left "#{E:@catppuccin_status_session} "
set -g status-right "#{?client_prefix,#[fg=#cba6f7]#[fg=#11111b#,bg=#cba6f7#,bold] PREFIX #[default] ,}#(count=\"$($HOME/.config/tmux/scripts/agent-attention status)\"; [ -n \"\$count\" ] && echo \"#[fg=#fab387]#[fg=#11111b,bg=#fab387]AI #[fg=#cdd6f4,bg=#313244] \$count#[fg=#313244] \")"
set -ag status-right "#{E:@catppuccin_status_application}"
set -agF status-right "#{E:@catppuccin_status_cpu}"
set -ag status-right "#{E:@catppuccin_status_host}"
set -ag status-right "#{E:@catppuccin_status_uptime}"

set -g @catppuccin_window_default_text " #W#{?@agent_attention, [!],} "
set -g @catppuccin_window_current_text " #W#{?@agent_attention, [!],}#{?window_zoomed_flag,(Z),} "

# Open picker for windows that need attention.
bind A display-popup -E -w 80% -h 70% "$HOME/.config/tmux/scripts/agent-attention menu"

# Clear attention when switching to a window/session.
set-hook -g after-select-window "run-shell '$HOME/.config/tmux/scripts/agent-attention clear-current'"
set-hook -g client-session-changed "run-shell '$HOME/.config/tmux/scripts/agent-attention clear-current'"

# Note: Plugins are loaded by TPM below. Do not run them directly.

# Set ssh auth
set -g update-environment "DISPLAY SSH_ASKPASS SSH_AGENT_PID SSH_CONNECTION WINDOWID XAUTHORITY"
set-environment -g 'SSH_AUTH_SOCK' $HOME/.ssh/ssh_auth_sock

# Initialize TPM (must be last)
run '$HOME/.tmux/plugins/tpm/tpm'
