# -----------------------------------------------------------------------------
# Terminal and protocol features
# -----------------------------------------------------------------------------

# Standard tmux terminal inside the session.
set-option -g default-terminal "tmux-256color"

# Modern RGB / True Color support for common host terminals.
set-option -as terminal-features ",xterm*:RGB,alacritty:RGB,ghostty:RGB,wezterm:RGB,kitty:RGB"

# Modern undercurl / underline styling support.
set-option -as terminal-features ",xterm*:usstyle,alacritty:usstyle,ghostty:usstyle,wezterm:usstyle,kitty:usstyle"

# Window titles shown to the outer terminal.
set-option -g set-titles on
set-option -g set-titles-string "#H / #W"


# -----------------------------------------------------------------------------
# Core behavior
# -----------------------------------------------------------------------------

set -g prefix ^B
set -g base-index 1              # start indexing windows at 1 instead of 0
setw -g pane-base-index 1        # start indexing panes at 1 instead of 0
set -g detach-on-destroy off     # don't exit from tmux when closing a session
set -g escape-time 0             # zero-out escape time delay
set -g history-limit 20000       # increase history size (from 2,000)
set -g renumber-windows on       # renumber all windows when any window is closed
set -g set-clipboard on          # use system clipboard
set -g allow-passthrough on      # allow OSC52 to pass through to outer terminal
set -g focus-events on           # let programs detect pane focus changes
set -g mouse on                  # enable mouse (click panes/windows, resize, scroll)
set -g extended-keys on          # xterm-style extended key reporting (CSI u)
set -g extended-keys-format csi-u # use CSI u format for extended keys
set -g repeat-time 1000          # 1s window for repeatable bindings
set -g status-position top       # macOS / darwin style
setw -g mode-keys vi
setw -g aggressive-resize on     # resize based on active client, not smallest


# -----------------------------------------------------------------------------
# Theme palette
# -----------------------------------------------------------------------------

# Catppuccin Mocha palette used directly (no theme plugin).
# Tmux uses a dark block + warm accent text look so it visually breaks away
# from the nvim tabline right below it.
set -g @color_sky '#89dceb'
set -g @color_lavender '#b4befe'
set -g @color_lavender_border '#cba6f7'
set -g @color_peach '#fab387'
set -g @color_red '#f38ba8'
set -g @color_yellow '#f9e2af'
set -g @color_green 'green'
set -g @color_blue 'blue'
set -g @color_text '#cdd6f4'
set -g @color_subtext0 '#a6adc8'
set -g @color_overlay0 '#6c7086'
set -g @color_surface0 '#313244'
set -g @color_surface1 '#45475a'
set -g @color_surface2 '#585b70'
set -g @color_base '#1e1e2e'
set -g @color_crust '#11111b'


# -----------------------------------------------------------------------------
# Tmux UI styles
# -----------------------------------------------------------------------------

set -g pane-active-border-style 'fg=#{@color_lavender_border},bg=default'
set -g pane-border-style 'fg=#{@color_overlay0},bg=default'
set -g mode-style 'fg=#{@color_crust},bg=#{@color_sky},bold'
set -g message-style 'fg=#{@color_text},bg=#{@color_surface0}'
set -g message-command-style 'fg=#{@color_crust},bg=#{@color_sky},bold'
set -g popup-style 'fg=#{@color_text},bg=#{@color_base}'
set -g popup-border-style 'fg=#{@color_overlay0},bg=#{@color_base}'
set -g menu-style 'fg=#{@color_text},bg=#{@color_base}'
set -g menu-selected-style 'fg=#{@color_crust},bg=#{@color_sky},bold'


# -----------------------------------------------------------------------------
# Session and window navigation
# -----------------------------------------------------------------------------
bind -N "session picker (tms)" s display-popup -E -w 90% -h 85% "$HOME/.config/tmux/scripts/session-picker"

bind -N "session tree (sorted)" S choose-tree -sZ -O name
bind -N "reload .tmux.conf" R source-file "$HOME/.tmux.conf" \; display-message "Sourced $HOME/.tmux.conf"
bind -N "last session" g run-shell -b "$HOME/.config/tmux/scripts/tms last"
bind -N "root session at cwd" T run-shell -b "$HOME/.config/tmux/scripts/tms connect \"#{pane_current_path}\""
bind -n MouseDown1StatusLeft choose-tree -s  # click session tab to open session picker


# -----------------------------------------------------------------------------
# Pane / window management
# -----------------------------------------------------------------------------

bind -n C-q clear-history

# Vi copy-mode bindings.
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-selection-and-cancel

# Splits and new windows inherit current path.
bind -N "split vertical (cwd)" '"' split-window -v -c "#{pane_current_path}"
bind -N "split horizontal (cwd)" % split-window -h -c "#{pane_current_path}"
bind -N "new window (cwd)" c new-window -c "#{pane_current_path}"
bind -N "move pane to picked target" M run-shell "$HOME/.config/tmux/scripts/move-pane-picker '#{pane_id}'"

# Cycle vertical split width between 1/3, 1/2, and 2/3.
# Mnemonic: 'r' for resize-cycle (matches sway's mod+r preset-width).
bind -N "cycle pane width 1/3 - 1/2 - 2/3" -r r run-shell 'pw=#{pane_width}; ww=#{window_width}; r=$((pw * 100 / ww)); if [ $r -lt 40 ]; then tmux resize-pane -x $((ww / 2)); elif [ $r -lt 60 ]; then tmux resize-pane -x $((ww * 2 / 3)); else tmux resize-pane -x $((ww / 3)); fi'


# -----------------------------------------------------------------------------
# Picker helpers and local scripts
# -----------------------------------------------------------------------------

set-environment -g TMUX_FZF_OPTIONS "-p -w 80% -h 75% -m"

# Clipboard history picker (mirrors sway's mod+v / mod+Shift+c).
bind -N "clipboard history" v run-shell -b "$HOME/.tmux/plugins/tmux-fzf/scripts/clipboard.sh"
bind -N "cheatsheet popup" C-g display-popup -E -w 60% -h 80% "$HOME/.config/tmux/scripts/cheatsheet"
bind -N "agent attention picker" A display-popup -E -w 80% -h 70% "$HOME/.config/tmux/scripts/agent-attention menu"

# Tab / Shift+Tab: pick / jump-pick visible matches.
# Mnemonic: Tab through visible hints (mirrors sway mod+Tab "pick a thing").
set -g @fingers-key Tab
set -g @fingers-jump-key BTab
set -g @fingers-show-copied-notification 1
set -g @fingers-hint-style 'fg=green,bold,underscore'
set -g @fingers-selected-hint-style 'fg=blue,bold,underscore'
set -g @fingers-pattern-0 '[A-Za-z0-9._%+-]+@[A-Za-z0-9.-]+\.[A-Za-z]{2,}'
set -g @fingers-pattern-1 '\b[a-zA-Z0-9.-]+:\d{2,5}\b'
set -g @fingers-pattern-2 '\bv?\d+\.\d+\.\d+\b'
set -g @fingers-pattern-3 '\bD\d+\b'
set -g @fingers-pattern-4 '\bT\d+\b'


# -----------------------------------------------------------------------------
# Plugins
# -----------------------------------------------------------------------------

set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'tmux-plugins/tmux-cpu'
set -g @plugin 'Morantron/tmux-fingers#2.6.2'
set -g @plugin 'sainnhe/tmux-fzf'
set -g @plugin 'christoomey/vim-tmux-navigator'

# Note: plugins are loaded by TPM at the end of the file. Do not run them directly.


# -----------------------------------------------------------------------------
# Status bar layout
# -----------------------------------------------------------------------------

# Native status bar with merged windows and boxed high-signal segments.
# Keep the bar itself on the terminal default background so inactive
# windows and flat right-side segments do not get an extra fill.
set -g status-style 'bg=default,fg=#{@color_text}'

# Switch hooks below drive most updates; the timer just covers passive
# segments (CPU, RAM, uptime) and any transient state the hooks miss.
set -g status-interval 5
set -g status-left-length 40
set -g status-right-length 210
set -g status-justify left
set -g window-status-separator '  '
set -g window-status-style 'bg=default'

# Shared label format for active-pane derived window names.
set -g @win_label '#($HOME/.config/tmux/scripts/status-window-label "#{window_name}" "#{pane_current_command}" "#{pane_title}" "#{pane_current_path}" "#{host}" "#{pane_pid}")'

# Spacer between right-side segments. Bumping this changes every gap.
set -g @sep '#[default]  '

# Trailing whitespace is intentional padding before the first window block.
set -g status-left '#[fg=#{@color_sky},bg=#{@color_surface0},bold] #S #[default]   '
set -g window-status-format '#[fg=#{@color_overlay0}]#[bg=#{@color_surface0}] #I #[fg=#{@color_subtext0}]#[bg=#{@color_surface0}]#{E:@win_label}#{?window_zoomed_flag, 󰍉,}#{?@agent_attention, #[fg=#{@color_red}]#[bg=#{@color_surface0}]!,} #[default]'
set -g window-status-current-format '#[fg=#{@color_lavender}]#[bg=#{@color_surface2}]#[bold] #I #{E:@win_label}#{?window_zoomed_flag, 󰍉,}#{?@agent_attention, #[fg=#{@color_red}]#[bg=#{@color_surface2}]!,} #[default]'

# tmux-cpu thresholds: <75 muted, 75-90 peach fg, >90 text fg on surface1.
set -g @cpu_low_fg_color    '#[fg=#{@color_subtext0}]'
set -g @cpu_medium_fg_color '#[fg=#{@color_peach}]'
set -g @cpu_high_fg_color   '#[fg=#{@color_text}]'
set -g @cpu_low_bg_color    '#[bg=#{@color_surface0}]'
set -g @cpu_medium_bg_color '#[bg=#{@color_surface0}]'
set -g @cpu_high_bg_color   '#[bg=#{@color_surface0}]'
set -g @cpu_medium_thresh   75
set -g @cpu_high_thresh     90

# AI / PREFIX badges use the same subtle surface as the session block so the
# accents read like outlined boxes instead of fully filled pills.
set -g status-right '#{?client_prefix,#[fg=#{@color_yellow}]#[bg=#{@color_surface0}]#[bold] PREFIX #[default]#{E:@sep},}#[fg=#{@color_peach}]#[bg=#{@color_surface0}]#[bold]#($HOME/.config/tmux/scripts/status-ai)#[default]#{cpu_bg_color}#{cpu_fg_color}󰍛 #{cpu_percentage}#[default]#{E:@sep}#($HOME/.config/tmux/scripts/status-ram)#[default]#{E:@sep}#[fg=#{@color_subtext0}]#[bg=#{@color_surface0}]󰒋 #H#[default]#{E:@sep}#[fg=#{@color_subtext0}]#[bg=#{@color_surface0}]󰔚 #($HOME/.config/tmux/scripts/status-uptime)#[default]'


# -----------------------------------------------------------------------------
# Attention hooks
# -----------------------------------------------------------------------------

# Clear attention when switching panes/windows/sessions. The hook fires from
# the tmux server, so TMUX_PANE is not propagated and find_tty() can't help;
# we pass the focused pane id via --pane #{pane_id} instead. clear-current
# itself calls refresh-client -S, so the hooks don't need to repeat it.
%hidden ATTN_CLEAR="run-shell -b '$HOME/.config/tmux/scripts/agent-attention clear-current --pane #{pane_id}'"
set-hook -g pane-focus-in          "$ATTN_CLEAR"
set-hook -g after-select-window    "$ATTN_CLEAR"
set-hook -g client-session-changed "$ATTN_CLEAR"


# -----------------------------------------------------------------------------
# Environment and plugin bootstrap
# -----------------------------------------------------------------------------

# SSH agent passthrough.
set -g update-environment "DISPLAY SSH_ASKPASS SSH_AGENT_PID SSH_CONNECTION WINDOWID XAUTHORITY"
set-environment -g 'SSH_AUTH_SOCK' $HOME/.ssh/ssh_auth_sock

# Initialize TPM (must be last).
run '$HOME/.tmux/plugins/tpm/tpm'
