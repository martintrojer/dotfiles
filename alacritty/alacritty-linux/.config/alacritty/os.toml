# Linux-specific alacritty overrides. Loaded via `import` from the base
# alacritty.toml in the `alacritty` (common) stow package. Only one of
# alacritty-darwin / alacritty-linux is ever stowed on a given machine,
# so this file always lands at ~/.config/alacritty/os.toml without conflict.

[window]
opacity = 0.9

[font]
size = 12

[font.offset]
y = 1

[hints]
enabled = [
  { regex = "(https://|http://)[^\u0000-\u001F\u007F-\u009F<>\"\\s{-}\\\\^⟨⟩`]+", command = "xdg-open", post_processing = true, mouse = { enabled = true, mods = "Control" } }
]
