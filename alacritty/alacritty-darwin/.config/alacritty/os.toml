# macOS-specific alacritty overrides. Loaded via `import` from the base
# alacritty.toml in the `alacritty` (common) stow package. Only one of
# alacritty-darwin / alacritty-linux is ever stowed on a given machine,
# so this file always lands at ~/.config/alacritty/os.toml without conflict.

[window]
decorations = "Buttonless"
blur = true
opacity = 0.8
# Left Option -> Meta/Alt for tmux bindings (M-Up etc). Right Option keeps
# native macOS behaviour for typographical special chars (Option+e -> é).
option_as_alt = "OnlyLeft"

[font]
size = 15

[hints]
enabled = [
  { regex = "(https://|http://)[^\u0000-\u001F\u007F-\u009F<>\"\\s{-}\\\\^⟨⟩`]+", command = "open", post_processing = true, mouse = { enabled = true, mods = "Command" } }
]
