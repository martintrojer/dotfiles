# Catppuccin Mocha color palette for fuzzel

[main]
font=JetBrains Mono Nerd Font:size=14:weight=bold
# footclient reuses the sway-foot-server.service daemon.
terminal=footclient -a {cmd} -T {cmd} {cmd}
layer=overlay
prompt=" "
icons-enabled=yes
# Adwaita ships in Sericea; Papirus would cover more but needs layering.
icon-theme=Adwaita
fields=filename,name,generic,exec,categories,keywords,comment
filter-desktop=yes
show-actions=yes
match-counter=yes
minimal-lines=yes
width=60
lines=15
horizontal-pad=30
vertical-pad=20
inner-pad=15

[colors]
# Mirrors foot palette + 0.9 alpha (e6). selection/border match sway's
# focused-inactive surface + focused child_border so the picker reads
# as a native sway surface.
background=1e1e2ee6
text=cdd6f4ff
match=f5c2e7ff
selection=585b70ff
selection-text=cdd6f4ff
selection-match=f9e2afff
border=cba6f7ff

[border]
width=2
# Square corners to match sway/waybar/mako/foot.
radius=0
